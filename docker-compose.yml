# Local development stack: Postgres (with pgvector preinstalled), Redis, and the app.
# Production runs three separate processes (web, worker, watcher) - those land in Phase 7.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: earnings
      POSTGRES_PASSWORD: earnings
      POSTGRES_DB: earnings
    # Host port 5434 avoids conflicting with a Windows-side Postgres install
    # on 5432 and other dev containers commonly on 5433. The internal port
    # stays 5432, so the app container's DATABASE_URL
    # (postgresql+psycopg://earnings:earnings@db:5432/earnings) is unchanged
    # and CI's services job (which talks to Postgres directly without compose)
    # also keeps its 5432 mapping.
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earnings -d earnings"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://earnings:earnings@db:5432/earnings
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
